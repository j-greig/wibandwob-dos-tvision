name: Contract Parity Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parity:
    name: Source-parity contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic

      - name: Run contract tests (source-parsing only)
        run: |
          pytest tests/contract/ \
            -v \
            --tb=short \
            -x \
            -k "window_type_parity or parity_drift or capabilities_schema or no_hardcoded or timer_cleanup or skill_references"
